<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★HOSHI アプリ・ハブ</title>
<style>
  :root{
    --bg:#f7f7f5; --card:#ffffff; --ink:#1a1a19; --sub:#5f5e5a;
    --border:#e3e2db; --accent:#2a78d6; --accent-ink:#0c447c; --ok:#0f6e56; --ok-bg:#e1f5ee;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#141413; --card:#1e1e1c; --ink:#f2f1ea; --sub:#b7b6ac;
           --border:#33322e; --accent:#3987e5; --accent-ink:#b5d4f4; --ok:#5dcaa5; --ok-bg:#0f2e26; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
       line-height:1.6;-webkit-text-size-adjust:100%}
  .wrap{max-width:640px;margin:0 auto;padding:24px 16px 48px}
  header{margin-bottom:8px}
  h1{font-size:22px;font-weight:600;margin:0 0 4px}
  .lead{color:var(--sub);font-size:14px;margin:0 0 20px}
  .status{display:inline-flex;align-items:center;gap:6px;background:var(--ok-bg);color:var(--ok);
          font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px;margin-bottom:20px}
  .status .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .grid{display:grid;gap:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;
        padding:16px 18px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:14px}
  .card:active{transform:scale(0.99)}
  .ico{width:44px;height:44px;border-radius:12px;background:var(--ok-bg);color:var(--accent-ink);
       display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .meta{flex:1;min-width:0}
  .name{font-size:16px;font-weight:600;margin:0}
  .desc{font-size:13px;color:var(--sub);margin:2px 0 0}
  .go{color:var(--accent);font-size:14px;font-weight:500;white-space:nowrap}
  .note{margin-top:28px;padding:14px 16px;background:var(--card);border:1px solid var(--border);
        border-radius:12px;font-size:13px;color:var(--sub)}
  .note b{color:var(--ink);font-weight:600}
  footer{margin-top:24px;color:var(--sub);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>★HOSHI アプリ・ハブ</h1>
    <p class="lead">カードをタップすると、その場でアプリが開いて動きます（ダウンロード不要）。</p>
  </header>

  <div class="status"><span class="dot"></span>公開中 — 動作確認済みのアプリ</div>

  <div class="grid">
    <a class="card" href="apps/issue-3/index.html">
      <div class="ico">¥</div>
      <div class="meta">
        <p class="name">税込計算ツール</p>
        <p class="desc">個数×単価に税10%を足して計算</p>
      </div>
      <span class="go">開く →</span>
    </a>

    <a class="card" href="apps/issue-2/index.html">
      <div class="ico">字</div>
      <div class="meta">
        <p class="name">文字数カウンター</p>
        <p class="desc">入力した文章の文字数を数える</p>
      </div>
      <span class="go">開く →</span>
    </a>

    <a class="card" href="apps/clock/index.html">
      <div class="ico">時</div>
      <div class="meta">
        <p class="name">時計</p>
        <p class="desc">現在時刻を表示するシンプル時計</p>
      </div>
      <span class="go">開く →</span>
    </a>
  </div>

  <div class="note">
    <b>この置き場について</b><br>
    ここに出しているのは公開してよい動作確認用アプリだけです。会社の業務ツールなど非公開のものは、ここには載せません（別の非公開ルートで扱います）。
  </div>

  <footer>★HOSHI · GitHub Pages 配信</footer>
</div>
</body>
</html>
