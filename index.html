<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★HOSHI</title>
<meta name="theme-color" content="#141413">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- ★P9(2026-07-09) 公開ハブ整理統合: 唯一のホーム=home.html(社長室)。ルート(index.html)は
     ここに着地した訪問者を確実にホームへ送るだけの薄いリダイレクト。旧「アプリ一覧」は
     apps.json へ集約し 広報部(pr.html)のカタログに一本化した。=index/home 不一致の解消。 -->
<meta http-equiv="refresh" content="0; url=home.html">
<link rel="canonical" href="home.html">
<script>location.replace('home.html');</script>
<style>
  :root{ --bg:#f7f7f5; --ink:#1a1a19; --sub:#5f5e5a; --accent-ink:#0c447c; --chip:#f0efea; --border:#e3e2db; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#141413; --ink:#f2f1ea; --sub:#b7b6ac; --accent-ink:#b5d4f4; --chip:#26251f; --border:#33322e; }
  }
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
       display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.6}
  .box{padding:24px}
  .mark{font-size:34px;font-weight:700;letter-spacing:.02em}
  .msg{color:var(--sub);font-size:14px;margin-top:6px}
  .go{display:inline-block;margin-top:16px;padding:8px 16px;font-size:14px;font-weight:600;
      color:var(--accent-ink);background:var(--chip);border:1px solid var(--border);border-radius:10px;text-decoration:none}
</style>
</head>
<body>
  <div class="box">
    <div class="mark">★HOSHI</div>
    <p class="msg">ホームへ移動しています…</p>
    <noscript><p class="msg">自動で移動しない場合は下のボタンから。</p></noscript>
    <a class="go" href="home.html">⌂ ★HOSHI ホームを開く →</a>
  </div>
</body>
</html>
