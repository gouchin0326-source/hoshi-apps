<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>★HOSHI アートパズル 絵画修復</title>
<style>
:root{--bg:#0d0f14;--panel:#171a22e6;--panel2:#1f2330;--gold:#d4af37;--gold2:#f0d070;--tx:#e8e4d8;--tx2:#9a94a8;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--tx);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;overflow-x:hidden;}
#bgArt{position:fixed;inset:0;background-size:cover;background-position:center;z-index:0;}
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;background:linear-gradient(#0d0f14f2,#0d0f14cc);z-index:10;}
#topbar h1{font-size:16px;letter-spacing:.1em;color:var(--gold);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iconbtn{background:var(--panel);border:1px solid #2c3040;color:var(--tx);border-radius:10px;min-width:44px;height:40px;font-size:17px;cursor:pointer;padding:0 10px;}
.iconbtn:active{transform:scale(.96);}
main{flex:1;padding:6px 14px 30px;}
section{display:none;}
section.on{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.sub{color:var(--tx2);font-size:12px;line-height:1.6;}
h2{font-size:14px;color:var(--gold2);letter-spacing:.15em;margin:18px 0 8px;font-weight:600;}
/* home: genre tiles */
#genreGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:10px;}
.gtile{background:var(--panel);border:1px solid #2c3040;border-radius:14px;padding:14px;cursor:pointer;color:var(--tx);text-align:left;position:relative;backdrop-filter:blur(2px);}
.gtile:active{transform:scale(.97);}
.gtile .gi{font-size:26px;}
.gtile .gn{font-size:15px;font-weight:700;margin-top:6px;}
.gtile .gd{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.5;min-height:32px;}
.gtile .gp{font-size:12px;color:var(--gold);margin-top:6px;letter-spacing:.08em;}
.gtile.soon{opacity:.55;}
.gtile .soonb{position:absolute;top:10px;right:10px;font-size:10px;background:#2c3040;border-radius:8px;padding:2px 8px;color:var(--tx2);}
/* gallery */
#galleryGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.acard{background:var(--panel);border:1px solid #2c3040;border-radius:13px;overflow:hidden;}
.acard canvas{width:100%;display:block;aspect-ratio:1;}
.acard .ai{padding:7px 10px;}
.acard .at{font-size:12px;font-weight:600;}
.acard .ap{font-size:11px;color:var(--gold);margin-top:2px;}
.acard.done{border-color:var(--gold);}
/* genre screen: stage list */
#stageList{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px;}
.snode{background:var(--panel);border:1px solid #2c3040;border-radius:12px;padding:11px 13px;cursor:pointer;text-align:left;color:var(--tx);}
.snode:active{transform:scale(.97);}
.snode .st{font-size:13px;font-weight:600;}
.snode .ss{font-size:11px;color:var(--tx2);margin-top:2px;}
.snode .stars{color:var(--gold);font-size:13px;margin-top:5px;letter-spacing:.1em;min-height:16px;}
.snode.locked{opacity:.4;}
.snode.cleared{border-color:#4a4632;}
#gDesc{background:var(--panel);border:1px solid #2c3040;border-radius:12px;padding:12px 14px;margin-top:10px;font-size:12px;color:var(--tx2);line-height:1.7;}
/* play */
#hud{display:flex;align-items:center;gap:8px;margin:4px 0 8px;flex-wrap:wrap;}
#hudGoal{font-size:12px;color:var(--tx2);flex:1;min-width:120px;}
.chip{background:var(--panel);border:1px solid #2c3040;border-radius:9px;padding:5px 10px;font-size:12px;white-space:nowrap;}
.chip b{color:var(--gold2);font-size:14px;}
#boardWrap{position:relative;display:flex;justify-content:center;}
#board{touch-action:none;border-radius:12px;background:#05060a;max-width:100%;user-select:none;-webkit-user-select:none;}
#msg{min-height:22px;text-align:center;font-size:12px;color:var(--gold2);margin-top:8px;}
#combo{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-size:38px;font-weight:800;color:var(--gold2);text-shadow:0 2px 12px #000;opacity:0;pointer-events:none;transition:opacity .15s,transform .3s;}
#combo.pop{opacity:1;transform:translate(-50%,-70%);}
/* modal */
#ovl{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
#ovl.on{display:flex;}
#mbox{background:var(--panel2);border:1px solid var(--gold);border-radius:16px;padding:22px;max-width:420px;width:100%;text-align:center;animation:fade .3s;max-height:90vh;overflow:auto;}
#mbox h2{color:var(--gold);font-size:18px;letter-spacing:.1em;margin:0;}
#mbox .bigstars{font-size:30px;color:var(--gold);margin:10px 0 4px;letter-spacing:.2em;}
#mbox canvas{width:100%;border-radius:10px;margin:10px 0;aspect-ratio:1;}
#mbox .row{display:flex;gap:10px;margin-top:14px;}
.btn{flex:1;background:var(--gold);color:#1a1405;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn.ghost{background:var(--panel);color:var(--tx);border:1px solid #3a3f52;}
.btn:active{transform:scale(.97);}
footer{padding:10px;text-align:center;font-size:10px;color:#565064;}
</style>
</head>

<div id="bgArt"></div>
<div id="app">
  <div id="topbar">
    <button class="iconbtn" id="backBtn" style="display:none">←</button>
    <h1 id="tbTitle">★HOSHI アートパズル『絵画修復』</h1>

  <main>
    <section id="scr-home">
      <div class="sub">瓦礫と封印に覆われたAIアート絵画を、あらゆるパズル技法で発掘・修復し、ギャラリーに収蔵しよう。</div>
      <h2>■ 修復技法（ジャンル）</h2>
      <div id="genreGrid"></div>
      <h2>■ ギャラリー（修復した絵画）</h2>
      <div id="galleryGrid"></div>

    <section id="scr-genre">

      <div id="stageList"></div>
    </section>
    <section id="scr-play">

        <span class="chip" id="hudStage"></span>

      <div id="boardWrap"><canvas id="board"></canvas><div id="combo"></div></div>
      <div id="msg"></div>
    </section>
  </main>
  <footer>★HOSHI AI ART PUZZLE — art generated &amp; built on ★HOSHI (RTX 5080) / 通信は初回読込のみ・進捗は端末内保存</footer>
</div>
<div id="ovl"><div id="mbox"></div></div>
<script>
"use strict";
/* ============ util ============ */
function makeRng(seed){let s=(seed>>>0)||1;function next(){s^=s<<13;s>>>=0;s^=s>>>17;s^=s<<5;s>>>=0;return s/4294967296;}return{next,int:function(n){return Math.floor(next()*n);}};}
function $(id){return document.getElementById(id);}
function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
/* ============ store ============ */
const Store={
  KEY:"hoshiPuzzle.v3",
  data:null,
  load(){try{this.data=JSON.parse(localStorage.getItem(this.KEY))||{};}catch(e){this.data={};}
    this.data.progress=this.data.progress||{};this.data.settings=this.data.settings||{sfx:true};this.data.resume=this.data.resume||null;},
  save(){try{localStorage.setItem(this.KEY,JSON.stringify(this.data));}catch(e){}},
  prog(gid){if(!this.data.progress[gid])this.data.progress[gid]={cleared:[],stars:[],best:{}};return this.data.progress[gid];}
};
/* ============ audio (WebAudio合成・ファイル0) ============ */
const Audio2={
  ctx:null,
  ok(){return Store.data.settings.sfx;},
  ac(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return this.ctx;},
  tone(f,dur,type,vol,when){const ac=this.ac();if(!ac||!this.ok())return;const o=ac.createOscillator(),g=ac.createGain();o.type=type||"sine";o.frequency.value=f;
    const t=ac.currentTime+(when||0);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur+0.05);},
  tap(){this.tone(660,0.06,"sine",0.10);},
  snap(){this.tone(520,0.09,"triangle",0.16);this.tone(780,0.12,"sine",0.10,0.03);},
  bad(){this.tone(180,0.12,"sawtooth",0.08);},
  clearRun(combo){const base=440*Math.pow(1.12,Math.min(combo,8));this.tone(base,0.1,"triangle",0.15);this.tone(base*1.5,0.12,"sine",0.10,0.04);},
  fanfare(){const seq=[523,659,784,1047];for(let i=0;i<seq.length;i++)this.tone(seq[i],0.22,"triangle",0.16,i*0.12);}
};
/* ============ placeholder art（画像不在でも動く内蔵画家） ============ */
function genPlaceholder(seedStr){
  const rng=makeRng(hashStr(seedStr));const S=960;const cv=document.createElement("canvas");cv.width=S;cv.height=S;const x=cv.getContext("2d");
  const hues=[[230,45],[280,40],[200,50],[330,42],[25,55]];const hu=hues[rng.int(hues.length)];
  const g=x.createLinearGradient(0,0,0,S);g.addColorStop(0,"hsl("+hu[0]+","+hu[1]+"%,8%)");g.addColorStop(.62,"hsl("+(hu[0]+25)+","+hu[1]+"%,20%)");g.addColorStop(1,"hsl("+(hu[0]+40)+",60%,32%)");
  x.fillStyle=g;x.fillRect(0,0,S,S);
  for(let i=0;i<160;i++){x.fillStyle="rgba(255,255,240,"+(0.2+rng.next()*0.6)+")";const r=rng.next()<0.93?1.3:2.6;x.beginPath();x.arc(rng.int(S),rng.int(S*0.55),r,0,7);x.fill();}
  x.fillStyle="hsl(48,85%,"+(78+rng.int(10))+"%)";x.beginPath();x.arc(S*0.72,S*0.2+rng.int(60),46+rng.int(26),0,7);x.fill();
  const horizon=S*0.66;
  for(let b=0;b<26;b++){const bw=40+rng.int(90),bh=80+rng.int(300),bx=rng.int(S+80)-40,by=horizon-bh;
    x.fillStyle="hsl("+(hu[0]+rng.int(30))+",25%,"+(6+rng.int(8))+"%)";x.fillRect(bx,by,bw,bh);
    x.fillStyle="hsla("+(35+rng.int(300))+",90%,65%,.85)";
    for(let wy=by+10;wy<horizon-12;wy+=16)for(let wx=bx+6;wx<bx+bw-8;wx+=14)if(rng.next()<0.42)x.fillRect(wx,wy,6,8);}
  const wg=x.createLinearGradient(0,horizon,0,S);wg.addColorStop(0,"hsla("+hu[0]+",70%,45%,.55)");wg.addColorStop(1,"hsla("+hu[0]+",70%,15%,.25)");
  x.fillStyle=wg;x.fillRect(0,horizon,S,S-horizon);
  return cv;
}
/* ============ art loader ============ */
const ArtCache={};
function loadArt(art){
  if(ArtCache[art.id])return ArtCache[art.id];
  ArtCache[art.id]=new Promise(function(res){
    if(!art.img){res(genPlaceholder(art.id));return;}
    const im=new Image();im.onload=function(){res(im);};im.onerror=function(){res(genPlaceholder(art.id));};im.src=art.img;
  });
  return ArtCache[art.id];
}
/* ============ Grid ============ */
function makeGrid(cols,rows){
  const cells=[];for(let i=0;i<cols*rows;i++)cells.push({art:i,block:null});
  return{cols:cols,rows:rows,cells:cells,idx:function(c,r){return r*cols+c;},cr:function(i){return[i%cols,Math.floor(i/cols)];},
    inb:function(c,r){return c>=0&&c<cols&&r>=0&&r<rows;}};
}
/* ============ Renderer（Canvas1枚・リッチ描画） ============ */
const BLOCK_COLORS=["#e05a5a","#4f9de0","#58c26e","#e0b03f","#a86fe0"];
const BLOCK_GLYPH=["●","▲","■","◆","★"];
const R={
  cv:null,x:null,px:1,cell:0,dpr:1,art:null,G:null,
  sel:-1,drag:null,hint:false,flash:{},parts:[],_tints:{},
  init(cv){this.cv=cv;this.x=cv.getContext("2d");},
  tint(hex,amt){const k=hex+"|"+amt;if(this._tints[k])return this._tints[k];
    const n=parseInt(hex.slice(1),16);let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
    r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
    return this._tints[k]="rgb("+r+","+g+","+b+")";},
  burst(cells,colorIdx){const cs=this.cell;
    for(const i of cells){const[c,r]=this.G.cr(i);const cx=c*cs+cs/2,cy=r*cs+cs/2;
      for(let p=0;p<7;p++){const a=Math.random()*6.283,v=cs*(0.02+Math.random()*0.05);
        this.parts.push({x:cx,y:cy,vx:Math.cos(a)*v,vy:Math.sin(a)*v-cs*0.03,
          size:2+Math.random()*Math.max(3,cs*0.09),life:1,
          col:colorIdx!=null?BLOCK_COLORS[colorIdx]:"#f0d070"});}}
    this.draw();},
  layout(G){this.G=G;const wrap=$("boardWrap");const avail=Math.min(wrap.clientWidth,window.innerHeight-190);
    const size=Math.max(240,Math.min(avail,640));this.dpr=Math.min(window.devicePixelRatio||1,2.5);
    this.cv.style.width=size+"px";this.cv.style.height=size+"px";
    this.cv.width=Math.round(size*this.dpr);this.cv.height=Math.round(size*this.dpr);
    this.x.setTransform(this.dpr,0,0,this.dpr,0,0);this.px=size;this.cell=size/G.cols;},
  cellAt(ev){const r=this.cv.getBoundingClientRect();const cx=Math.floor((ev.clientX-r.left)/this.cell),cy=Math.floor((ev.clientY-r.top)/this.cell);
    if(!this.G.inb(cx,cy))return -1;return this.G.idx(cx,cy);},
  drawPiece(i,dx,dy,scale){const G=this.G,cs=this.cell;const cell=G.cells[i];const s=scale||1;const off=cs*(1-s)/2;
    if(cell.block!=null){const col=BLOCK_COLORS[cell.block];const x=this.x;
      const gx=dx+off+1.5,gy=dy+off+1.5,gw=cs*s-3,gh=cs*s-3,rad=Math.min(10,cs*0.16);
      x.fillStyle="rgba(0,0,0,.45)";this.rr(gx+1.5,gy+2.5,gw,gh,rad);x.fill();
      const gr=x.createLinearGradient(gx,gy,gx,gy+gh);
      gr.addColorStop(0,this.tint(col,42));gr.addColorStop(.45,col);gr.addColorStop(1,this.tint(col,-38));
      x.fillStyle=gr;this.rr(gx,gy,gw,gh,rad);x.fill();
      const hl=x.createLinearGradient(gx,gy,gx,gy+gh*0.46);
      hl.addColorStop(0,"rgba(255,255,255,.5)");hl.addColorStop(1,"rgba(255,255,255,.04)");
      x.fillStyle=hl;this.rr(gx+gw*0.1,gy+gh*0.06,gw*0.8,gh*0.36,rad*0.8);x.fill();
      x.strokeStyle="rgba(255,255,255,.18)";x.lineWidth=1;this.rr(gx+.5,gy+.5,gw-1,gh-1,rad);x.stroke();
      x.fillStyle="rgba(0,0,0,.38)";x.font="600 "+Math.round(cs*0.36)+"px sans-serif";x.textAlign="center";x.textBaseline="middle";
      x.fillText(BLOCK_GLYPH[cell.block],dx+cs/2,dy+cs/2+cs*0.03);}
    else if(cell.art!=null){const a=cell.art;const img=this.art;const pw=img.width/G.cols,ph=img.height/G.rows;
      const[ac,ar]=G.cr(a);this.x.drawImage(img,ac*pw,ar*ph,pw,ph,dx+off,dy+off,cs*s,cs*s);}},
  rr(x0,y0,w,h,r){const x=this.x;x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath();},
  draw(){const G=this.G;if(!G)return;const x=this.x,cs=this.cell;
    x.clearRect(0,0,this.px,this.px);
    const bg=x.createRadialGradient(this.px/2,this.px/2,this.px*0.15,this.px/2,this.px/2,this.px*0.75);
    bg.addColorStop(0,"#0a0c14");bg.addColorStop(1,"#04050a");
    x.fillStyle=bg;x.fillRect(0,0,this.px,this.px);
    const now=performance.now();let needMore=false;
    for(let i=0;i<G.cells.length;i++){const[c,r]=G.cr(i);const dx=c*cs,dy=r*cs;
      if(this.drag&&this.drag.from===i)continue;
      this.drawPiece(i,dx,dy,1);
      if(G.cells[i].block==null&&G.cells[i].art===i&&Game.mod&&(Game.mod.id==="t3_swap"||Game.mod.id==="t5_boss")){x.strokeStyle="rgba(212,175,55,.25)";x.lineWidth=1;x.strokeRect(dx+1,dy+1,cs-2,cs-2);}
      const f=this.flash[i];if(f){const t=(now-f)/450;if(t<1){x.fillStyle="rgba(255,240,190,"+(0.55*(1-t))+")";x.fillRect(dx,dy,cs,cs);needMore=true;}else delete this.flash[i];}
      if(this.sel===i){x.strokeStyle="#f0d070";x.lineWidth=3;this.rr(dx+2,dy+2,cs-4,cs-4,8);x.stroke();}}
    x.strokeStyle="rgba(255,255,255,.05)";x.lineWidth=1;
    for(let c=1;c<G.cols;c++){x.beginPath();x.moveTo(c*cs,0);x.lineTo(c*cs,this.px);x.stroke();}
    for(let r=1;r<G.rows;r++){x.beginPath();x.moveTo(0,r*cs);x.lineTo(this.px,r*cs);x.stroke();}
    if(this.parts.length){const alive=[];
      for(const p of this.parts){p.x+=p.vx;p.y+=p.vy;p.vy+=this.cell*0.006;p.life-=0.045;
        if(p.life>0){x.globalAlpha=Math.max(0,p.life);x.fillStyle=p.col;
          x.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);alive.push(p);}}
      x.globalAlpha=1;this.parts=alive;if(alive.length)needMore=true;}
    if(this.float&&this.art){const a=this.float.art;const img=this.art;
      const pw=img.width/G.cols,ph=img.height/G.rows;const[fc,fr]=G.cr(a);
      const fdx=this.float.col*cs,fdy=this.float.y*cs;
      x.fillStyle="rgba(240,208,112,.12)";x.fillRect(fdx,0,cs,this.px);
      x.drawImage(img,fc*pw,fr*ph,pw,ph,fdx+1.5,fdy+1.5,cs-3,cs-3);
      x.strokeStyle="#f0d070";x.lineWidth=2;x.strokeRect(fdx+1.5,fdy+1.5,cs-3,cs-3);}
    x.strokeStyle="rgba(212,175,55,.5)";x.lineWidth=2;x.strokeRect(1,1,this.px-2,this.px-2);
    x.strokeStyle="rgba(212,175,55,.14)";x.lineWidth=6;x.strokeRect(4,4,this.px-8,this.px-8);
    if(this.hint&&this.art){x.globalAlpha=0.38;x.drawImage(this.art,0,0,this.px,this.px);x.globalAlpha=1;}
    if(this.drag){const d=this.drag;this.drawPiece(d.from,d.x-cs/2,d.y-cs/2,1.06);}
    if(needMore&&!this._raf){this._raf=true;requestAnimationFrame(()=>{this._raf=false;this.draw();});}},
  flashCells(list){const t=performance.now();for(const i of list)this.flash[i]=t;this.draw();}
};
/* ============ RuleModule: T3 修復 ============ */
function T3Swap(){
  let G,rng,moves=0,opt=0;
  function solved(){return G.cells.every((c,i)=>c.art===i);}
  function cycles(perm){const seen=new Array(perm.length).fill(false);let n=0;
    for(let i=0;i<perm.length;i++){if(seen[i])continue;n++;let j=i;while(!seen[j]){seen[j]=true;j=perm[j];}}return n;}
  return{
    id:"t3_swap",gestures:["tap","dragdrop"],
    goalText:"ピースを入れ替えて絵を修復せよ（2枚をタップ or ドラッグで交換）",hint:true,
    init(stage,ctx){G=ctx.grid;rng=ctx.rng;const n=G.cells.length;
      let perm;for(let t=0;t<40;t++){perm=[...Array(n).keys()];
        for(let i=n-1;i>0;i--){const j=rng.int(i+1);[perm[i],perm[j]]=[perm[j],perm[i]];}
        const fixed=perm.filter((p,i)=>p===i).length;

/* ============ RuleModule: T1 発掘 ============ */
function T1Excavate(){
  let G,rng,colors=4,moves=0,brush=false,busy=false;
  function covered(i){return G.cells[i].block!=null;}
  function coveredCount(){return G.cells.filter(c=>c.block!=null).length;}
  function lineIdx(){const lines=[];
    for(let r=0;r<G.rows;r++){const L=[];for(let c=0;c<G.cols;c++)L.push(G.idx(c,r));lines.push(L);}
    for(let c=0;c<G.cols;c++){const L=[];for(let r=0;r<G.rows;r++)L.push(G.idx(c,r));lines.push(L);}
    return lines;}
  function findMatches(){const out=new Set();
    for(const L of lineIdx()){let run=[],prev=null;
      const flush=()=>{if(run.length>=3)run.forEach(i=>out.add(i));run=[];};
      for(const i of L){const b=covered(i)?G.cells[i].block:null;
        if(b!=null&&b===prev)run.push(i);else{flush();prev=b;run=b!=null?[i]:[];}}
      flush();}
    return[...out];}
  function gravity(){
    for(let c=0;c<G.cols;c++){const stack=[];
      for(let r=G.rows-1;r>=0;r--){const i=G.idx(c,r);if(covered(i))stack.push(G.cells[i].block);}
      let k=0;for(let r=G.rows-1;r>=0;r--){const i=G.idx(c,r);
        G.cells[i].block=k<stack.length?stack[k++]:null;}}}
  function hasMove(){
    for(let i=0;i<G.cells.length;i++){if(!covered(i))continue;const[c,r]=G.cr(i);
      for(const[dc,dr]of[[1,0],[0,1]]){if(!G.inb(c+dc,r+dr))continue;const j=G.idx(c+dc,r+dr);if(!covered(j))continue;
        const a=G.cells[i],b=G.cells[j];[a.block,b.block]=[b.block,a.block];
        const m=findMatches().length>0;[a.block,b.block]=[b.block,a.block];if(m)return true;}}
    return false;}
  function fill(){for(let t=0;t<40;t++){
      for(let i=0;i<G.cells.length;i++){const[c,r]=G.cr(i);let col;
        for(let g=0;g<20;g++){col=rng.int(colors);
          const l1=G.inb(c-1,r)?G.cells[G.idx(c-1,r)].block:null,l2=G.inb(c-2,r)?G.cells[G.idx(c-2,r)].block:null;
          const u1=G.inb(c,r-1)?G.cells[G.idx(c,r-1)].block:null,u2=G.inb(c,r-2)?G.cells[G.idx(c,r-2)].block:null;
          if(!(col===l1&&col===l2)&&!(col===u1&&col===u2))break;}

      if(hasMove()&&findMatches().length===0)return;}}
  function reshuffle(){const blocks=G.cells.filter(c=>c.block!=null).map(c=>c.block);
    for(let t=0;t<30;t++){
      for(let i=blocks.length-1;i>0;i--){const j=rng.int(i+1);[blocks[i],blocks[j]]=[blocks[j],blocks[i]];}
      let k=0;for(const c of G.cells)if(c.block!=null)c.block=blocks[k++];
      if(findMatches().length===0&&hasMove())return true;}
    return false;}
  async function resolve(){busy=true;let combo=0;
    while(true){const m=findMatches();if(!m.length)break;combo++;

      for(const i of m)G.cells[i].block=null;

      if(combo>=2){const cb=$("combo");cb.textContent=combo+" 連鎖!";cb.classList.add("pop");setTimeout(()=>cb.classList.remove("pop"),600);}
      await delay(200);gravity();R.draw();await delay(170);}
    busy=false;
    if(coveredCount()>0){
      if(coveredCount()<=6){brush=true;Game.msg("残りわずか——瓦礫をタップで払おう");}
      else if(!hasMove()){if(!reshuffle()){brush=true;Game.msg("残りはタップで払おう");}else{Game.msg("手が無いため瓦礫を組み替えた");R.draw();}}}
    return{moves:moves,clear:coveredCount()===0,combo:combo};}

    id:"t1_excavate",gestures:["tap","swipe"],
    goalText:"瓦礫を3つ揃えて崩し、下の絵を発掘せよ（隣とスワイプ）",hint:false,
    init(stage,ctx){G=ctx.grid;rng=ctx.rng;colors=Math.min(stage.colors||4,BLOCK_COLORS.length);moves=0;brush=false;fill();},
    async onSwipe(i,dir){if(busy)return null;const[c,r]=G.cr(i);const nc=c+dir[0],nr=r+dir[1];
      if(!G.inb(nc,nr))return null;const j=G.idx(nc,nr);
      if(!covered(i)||!covered(j)){Audio2.bad();return null;}
      const a=G.cells[i],b=G.cells[j];[a.block,b.block]=[b.block,a.block];R.draw();
      if(findMatches().length===0){await delay(120);[a.block,b.block]=[b.block,a.block];Audio2.bad();R.draw();return null;}
      moves++;Audio2.tap();return await resolve();},
    async onTap(i){if(busy)return null;
      if(brush&&covered(i)){G.cells[i].block=null;moves++;Audio2.snap();R.flashCells([i]);R.burst([i],null);

    isClear(){return coveredCount()===0;},
    movesOf(){return moves;},
    stars(){const n=G.cells.length;if(moves<=Math.ceil(n*0.27))return 3;if(moves<=Math.ceil(n*0.5))return 2;return 1;},
    serialize(){return{blocks:G.cells.map(c=>c.block),moves:moves,brush:brush,colors:colors};},
    restore(s){s.blocks.forEach((b,i)=>{G.cells[i].block=b;G.cells[i].art=i;});moves=s.moves;brush=s.brush;colors=s.colors;}
  };
}
/* ============ RuleModule: T2 整列（スライド・逆適用シャッフル=常時可解） ============ */
function T2Slide(){
  let G,rng,moves=0,empty=-1,shuf=[];
  function solved(){for(let i=0;i<G.cells.length;i++){if(i===empty)continue;if(G.cells[i].art!==i)return false;}return true;}
  function neighbors(i){const[c,r]=G.cr(i);const out=[];
    for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]])if(G.inb(c+dc,r+dr))out.push(G.idx(c+dc,r+dr));return out;}
  function moveTile(i){G.cells[empty].art=G.cells[i].art;G.cells[i].art=null;empty=i;}
  function doMove(i){const dest=empty;moveTile(i);moves++;
    if(G.cells[dest].art===dest){Audio2.snap();R.flashCells([dest]);}else Audio2.tap();
    R.draw();
    if(solved()){G.cells[empty].art=empty;R.draw();return{moves:moves,clear:true};}
    return{moves:moves,clear:false};}
  return{
    id:"t2_slide",gestures:["tap","swipe"],
    goalText:"空きマスへ滑らせて絵を整列させよ（空きマスの隣をタップ）",hint:true,
    init(stage,ctx){G=ctx.grid;rng=ctx.rng;const n=G.cells.length;
      for(let i=0;i<n;i++){G.cells[i].art=i;G.cells[i].block=null;}
      empty=n-1;G.cells[empty].art=null;shuf=[];
      const N=stage.shuffle||n*8;let last=-1;
      for(let k=0;k<N;k++){const nb=neighbors(empty).filter(j=>j!==last);
        const pick=nb[rng.int(nb.length)];last=empty;shuf.push(pick);moveTile(pick);}
      moves=0;},
    onTap(i){if(i===empty)return null;
      if(!neighbors(empty).includes(i)){Audio2.bad();return null;}
      return doMove(i);},
    onSwipe(i,dir){const[c,r]=G.cr(i);const jc=c+dir[0],jr=r+dir[1];
      if(!G.inb(jc,jr))return null;
      if(G.idx(jc,jr)===empty)return doMove(i);
      return null;},
    isClear(){return solved();},
    movesOf(){return moves;},
    stars(){const n=G.cells.length;if(moves<=n*5)return 3;if(moves<=n*9)return 2;return 1;},
    serialize(){return{art:G.cells.map(c=>c.art),empty:empty,moves:moves};},
    restore(s){s.art.forEach((a,i)=>{G.cells[i].art=a;G.cells[i].block=null;});empty=s.empty;moves=s.moves;},
    _shufSeq(){return shuf.slice();}
  };
}
/* ============ RuleModule: T4 補完（落ちもの・列タップで導く） ============ */
function T4Drop(){
  let G,rng,moves=0,misses=0,holes=[],queue=[],cur=null,speed=1.2,done=false;
  function holeInCol(c){for(const h of holes)if(h%G.cols===c&&G.cells[h].art==null)return h;return -1;}
  function allFilled(){return holes.every(h=>G.cells[h].art!=null);}
  function spawn(){if(!queue.length){cur=null;R.float=null;return;}
    cur={frag:queue[0],col:Math.floor(G.cols/2),y:-1};}
  return{
    id:"t4_drop",gestures:["tap"],
    goalText:"落ちる欠片の正しい場所の列をタップして導け（ヒント💡で完成図）",hint:true,
    init(stage,ctx){G=ctx.grid;rng=ctx.rng;speed=stage.speed||1.2;moves=0;misses=0;done=false;
      for(let i=0;i<G.cells.length;i++){G.cells[i].art=i;G.cells[i].block=null;}
      const k=Math.min(stage.holes||G.cols,G.cols);
      const cols=[...Array(G.cols).keys()];
      for(let i=cols.length-1;i>0;i--){const j=rng.int(i+1);[cols[i],cols[j]]=[cols[j],cols[i]];}
      holes=[];
      for(let x2=0;x2<k;x2++){const c=cols[x2];const r=1+rng.int(G.rows-1);const h=G.idx(c,r);holes.push(h);G.cells[h].art=null;}
      queue=holes.slice();
      for(let i=queue.length-1;i>0;i--){const j=rng.int(i+1);[queue[i],queue[j]]=[queue[j],queue[i]];}
      spawn();},
    onTap(i){if(!cur||done)return null;cur.col=i%G.cols;Audio2.tap();return null;},
    tick(dt){if(done||!cur)return null;
      cur.y+=speed*dt;
      const h=holeInCol(cur.col);
      const targetRow=h>=0?Math.floor(h/G.cols):G.rows-0.6;
      if(cur.y>=targetRow){
        moves++;
        if(h>=0&&cur.frag===h){G.cells[h].art=h;Audio2.snap();R.flashCells([h]);R.burst([h],null);queue.shift();}
        else{misses++;Audio2.bad();queue.push(queue.shift());}
        spawn();
        if(allFilled()){done=true;cur=null;R.float=null;R.draw();return{moves:moves,clear:true};}}
      R.float=cur?{art:cur.frag,col:cur.col,y:cur.y}:null;
      R.draw();
      return null;},
    isClear(){return done;},
    movesOf(){return moves;},
    stars(){if(misses===0)return 3;if(misses<=Math.ceil(holes.length/3))return 2;return 1;},
    serialize(){return{art:G.cells.map(c=>c.art),holes:holes.slice(),queue:queue.slice(),misses:misses,moves:moves,done:done};},
    restore(s){s.art.forEach((a,i)=>{G.cells[i].art=a;G.cells[i].block=null;});
      holes=s.holes;queue=s.queue;misses=s.misses;moves=s.moves;done=s.done;spawn();},
    _debug(){return{holes:holes.slice(),queue:queue.slice(),cur:cur?{frag:cur.frag,col:cur.col,y:cur.y}:null,misses:misses};}
  };
}

    e.target.setPointerCapture(e.pointerId);
    this.st="ARMED";this.start={x:e.clientX,y:e.clientY};this.startCell=i;},
  move(e){if(this.st==="IDLE"||!Game.mod)return;
    const dx=e.clientX-this.start.x,dy=e.clientY-this.start.y;const dist=Math.hypot(dx,dy);
    const g=Game.mod.gestures;
    if(this.st==="ARMED"&&dist>10){
      if(g.includes("dragdrop")){this.st="DRAG";}
      else if(g.includes("swipe")&&dist>Math.max(14,R.cell*0.3)){
        const dir=Math.abs(dx)>Math.abs(dy)?[dx>0?1:-1,0]:[0,dy>0?1:-1];
        this.st="IDLE";const c=this.startCell;this.startCell=-1;
        Game.handle(Game.mod.onSwipe&&Game.mod.onSwipe(c,dir));return;}}
    if(this.st==="DRAG"){const r=R.cv.getBoundingClientRect();
      R.drag={from:this.startCell,x:e.clientX-r.left,y:e.clientY-r.top};R.draw();}},
  up(e){if(!Game.mod){this.cancel();return;}
    if(this.st==="DRAG"){const to=R.cellAt(e);R.drag=null;
      const from=this.startCell;this.st="IDLE";this.startCell=-1;
      if(to>=0&&to!==from)Game.handle(Game.mod.onDrop&&Game.mod.onDrop(from,to));else R.draw();return;}
    if(this.st==="ARMED"){const i=R.cellAt(e);this.st="IDLE";
      if(i===this.startCell&&Game.mod.onTap)Game.handle(Game.mod.onTap(i));
      this.startCell=-1;return;}
    this.st="IDLE";},
  cancel(){this.st="IDLE";this.startCell=-1;R.drag=null;if(Game.mod)R.draw();}
};
/* ============ Game controller（ジャンル式） ============ */
const Game={
  arts:[],genres:[],mod:null,cur:null,grid:null,t0:0,
  msg(s){$("msg").textContent=s||"";},
  artOf(id){return this.arts.find(a=>a.id===id)||{id:id,title:id,img:""};},
  genreStars(gid){const p=Store.prog(gid);return(p.stars||[]).reduce((a,b)=>a+(b||0),0);},
  stageUnlocked(g,si){if(si===0)return true;const p=Store.prog(g.type);return!!p.cleared[si-1];},
  artProgress(aid){let tot=0,done=0;
    for(const g of this.genres){if(g.comingSoon)continue;const p=Store.prog(g.type);
      g.stages.forEach((st,si)=>{if(st.art===aid){tot++;if(p.cleared[si])done++;}});}
    return tot?done/tot:0;},
  async loadStage(gi,si,fresh){
    const g=this.genres[gi],st=g.stages[si];const def=MODULES[g.type];
    if(!def)return;
    const gd=st.grid||[5,5];this.grid=makeGrid(gd[0],gd[1]);
    const art=this.artOf(st.art);
    R.art=await loadArt(art);R.layout(this.grid);R.sel=-1;R.hint=false;R.flash={};R.parts=[];
    Shell.setBg(art);
    this.mod=def.make();this.cur={gi:gi,si:si};this.t0=Date.now();
    const ctx={grid:this.grid,rng:makeRng((st.seed||1)+si*7919)};
    this.mod.init(st,ctx);
    const rz=Store.data.resume;
    if(!fresh&&rz&&rz.gid===g.type&&rz.si===si&&rz.state){try{this.mod.restore(rz.state);}catch(e){}}
    Shell.show("play");
    $("hudStage").textContent=def.icon+" "+def.name+" "+(si+1)+" ("+gd[0]+"×"+gd[1]+")";
    $("hudGoal").textContent=this.mod.goalText;
    $("hudMoves").textContent=this.mod.movesOf();
    $("hintBtn").style.display=this.mod.hint?"":"none";
    $("resetBtn").style.display="";
    this.msg("『"+art.title+"』を修復中");R.float=null;R.draw();this.saveResume();this.startTicker();
  },
  _tk:null,_tkGen:0,
  startTicker(){const self=this;if(!this.mod||!this.mod.tick)return;
    const gen=++this._tkGen;let last=performance.now();let rafAlive=false;
    function step(){
      if(gen!==self._tkGen||Shell.scr!=="play"||!self.mod||!self.mod.tick){R.float=null;return false;}
      const now=performance.now();const dt=Math.min(0.05,(now-last)/1000);last=now;
      const res=self.mod.tick(dt);
      $("hudMoves").textContent=self.mod.movesOf();
      if(res&&res.clear){self._tkGen++;self.onClear();return false;}
      return true;}
    let fellBack=false;
    const rafLoop=function(){if(fellBack)return;rafAlive=true;if(step())requestAnimationFrame(rafLoop);};
    requestAnimationFrame(rafLoop);
    setTimeout(function(){
      if(gen!==self._tkGen)return;
      if(!rafAlive){fellBack=true;const toLoop=function(){if(step())setTimeout(toLoop,33);};toLoop();}
    },350);},
  saveResume(){if(!this.cur)return;const g=this.genres[this.cur.gi];
    Store.data.resume={gid:g.type,si:this.cur.si,state:this.mod.serialize()};Store.save();},
  async handle(resP){const res=await resP;if(!res)return;
    $("hudMoves").textContent=this.mod.movesOf();this.saveResume();
    if(res.clear)this.onClear();},
  onClear(){const{gi,si}=this.cur;const g=this.genres[gi];const p=Store.prog(g.type);
    const stars=this.mod.stars();const moves=this.mod.movesOf();const sec=Math.round((Date.now()-this.t0)/10)/100;
    p.cleared[si]=true;p.stars[si]=Math.max(p.stars[si]||0,stars);
    const bk="s"+si;if(!p.best[bk]||moves<p.best[bk].moves)p.best[bk]={moves:moves,time:sec};
    Store.data.resume=null;Store.save();
    Audio2.fanfare();
    Shell.clearModal(g,si,stars,moves,sec);
  }
};
/* ============ Shell（ホーム=ジャンル一覧+ギャラリー） ============ */
const Shell={
  scr:"home",gi:0,_bgCache:{},
  async setBg(art){if(!art||!art.img)return;const el=$("bgArt");
    if(!this._bgCache[art.id]){
      const img=await loadArt(art);const cv=document.createElement("canvas");cv.width=40;cv.height=40;
      const x=cv.getContext("2d");x.drawImage(img,0,0,40,40);
      x.fillStyle="rgba(5,6,10,.68)";x.fillRect(0,0,40,40);
      this._bgCache[art.id]=cv.toDataURL("image/jpeg",0.7);}
    el.style.backgroundImage="url('"+this._bgCache[art.id]+"')";},
  show(name){this.scr=name;["home","genre","play"].forEach(s=>$("scr-"+s).classList.toggle("on",s===name));
    $("backBtn").style.display=name==="home"?"none":"";
    if(name!=="play"){$("hintBtn").style.display="none";$("resetBtn").style.display="none";Game.mod=null;}
    $("tbTitle").textContent=name==="home"?"★HOSHI アートパズル『絵画修復』":
      name==="genre"?(MODULES[Game.genres[this.gi].type]||{}).icon+" "+Game.genres[this.gi].name:"修復作業中";},
  async drawArtTo(cv,art,fraction){
    const x=cv.getContext("2d");const img=await loadArt(art);const S=cv.width;
    x.clearRect(0,0,S,S);
    if(x.filter!==undefined){x.filter="grayscale(1) brightness(.55)";x.drawImage(img,0,0,S,S);x.filter="none";}
    else{x.globalAlpha=.3;x.drawImage(img,0,0,S,S);}
    if(fraction>0){x.globalAlpha=Math.min(1,fraction);x.drawImage(img,0,0,S,S);x.globalAlpha=1;}
    if(fraction>=1){x.strokeStyle="#d4af37";x.lineWidth=Math.max(3,S*0.012);x.strokeRect(x.lineWidth/2,x.lineWidth/2,S-x.lineWidth,S-x.lineWidth);}},
  home(){this.show("home");
    const gg=$("genreGrid");gg.innerHTML="";
    Game.genres.forEach((g,gi)=>{const def=MODULES[g.type];
      const tile=document.createElement("div");tile.className="gtile"+(g.comingSoon?" soon":"");
      const icon=def?def.icon:g.icon||"🧩";
      const total=g.comingSoon?0:g.stages.length*3;
      tile.innerHTML='<div class="gi">'+icon+'</div><div class="gn">'+g.name+'</div>'+
        '<div class="gd">'+g.desc+'</div>'+
        (g.comingSoon?'<div class="soonb">準備中</div><div class="gp">次のアップデートで開放</div>':
         '<div class="gp">★'+Game.genreStars(g.type)+" / "+total+"　全"+g.stages.length+"ステージ</div>");
      if(!g.comingSoon)tile.addEventListener("click",()=>this.genre(gi));
      else tile.addEventListener("click",()=>{tile.style.transform="scale(.97)";setTimeout(()=>tile.style.transform="",150);});
      gg.appendChild(tile);});
    const el=$("galleryGrid");el.innerHTML="";
    Game.arts.forEach(a=>{const fr=Game.artProgress(a.id);
      const card=document.createElement("div");card.className="acard"+(fr>=1?" done":"");
      const cv=document.createElement("canvas");cv.width=320;cv.height=320;card.appendChild(cv);
      const info=document.createElement("div");info.className="ai";
      info.innerHTML='<div class="at">'+a.title+'</div><div class="ap">'+
        (fr>=1?"収蔵済 ✨":"修復度 "+Math.round(fr*100)+"%")+'</div>';
      card.appendChild(info);el.appendChild(card);
      this.drawArtTo(cv,a,fr);});},
  genre(gi){this.gi=gi;const g=Game.genres[gi];const def=MODULES[g.type];const p=Store.prog(g.type);
    this.show("genre");
    $("gDesc").innerHTML="<b>"+def.icon+" "+g.name+"</b>　"+g.rule;
    const el=$("stageList");el.innerHTML="";
    g.stages.forEach((st,si)=>{const un=Game.stageUnlocked(g,si);
      const art=Game.artOf(st.art);const stars=p.stars[si]||0;
      const b=document.createElement("button");
      b.className="snode"+(un?"":" locked")+(p.cleared[si]?" cleared":"");
      b.innerHTML='<div class="st">ステージ'+(si+1)+"　"+(st.grid?st.grid[0]+"×"+st.grid[1]:"")+'</div>'+
        '<div class="ss">絵画『'+art.title+'』</div>'+
        '<div class="stars">'+(p.cleared[si]?"★".repeat(stars)+"☆".repeat(3-stars):(un?"未修復":"🔒 前のステージをクリア"))+'</div>';
      if(un)b.addEventListener("click",()=>Game.loadStage(gi,si));
      el.appendChild(b);});
    if(g.stages.length&&g.stages[0].art)this.setBg(Game.artOf(g.stages[0].art));},
  clearModal(g,si,stars,moves,sec){
    const mb=$("mbox");const st=g.stages[si];const art=Game.artOf(st.art);
    const fr=Game.artProgress(st.art);const collected=fr>=1;
    let html='<h2>'+(collected?"絵画修復 完了！":"ステージ"+(si+1)+" クリア")+'</h2>'+
      '<div class="bigstars">'+"★".repeat(stars)+"☆".repeat(3-stars)+'</div>'+
      '<div class="sub">手数 '+moves+"・時間 "+sec+"秒</div>";
    html+='<canvas id="mArt" width="480" height="480"></canvas>';
    html+='<div style="font-size:13px;font-weight:600">『'+art.title+'』修復度 '+Math.round(fr*100)+'%'+
      (collected?"　✨ギャラリーに収蔵！":"")+'</div>'+
      '<div class="sub" style="margin-top:4px">'+(art.credit||"")+'</div>';
    const nextSi=si+1;const hasNext=nextSi<g.stages.length;
    html+='<div class="row">'+
      '<button class="btn ghost" id="mHome">ホームへ</button>'+
      (hasNext?'<button class="btn" id="mNext">次のステージ</button>':
       '<button class="btn" id="mGenre">ステージ一覧</button>')+'</div>';
    mb.innerHTML=html;$("ovl").classList.add("on");
    this.drawArtTo($("mArt"),art,fr);
    $("mHome").addEventListener("click",()=>{$("ovl").classList.remove("on");this.home();});
    const nb=$("mNext");if(nb)nb.addEventListener("click",()=>{$("ovl").classList.remove("on");Game.loadStage(this.gi,nextSi);});
    const gb=$("mGenre");if(gb)gb.addEventListener("click",()=>{$("ovl").classList.remove("on");this.genre(this.gi);});
  }
};
/* ============ boot ============ */
const FALLBACK={version:3,
  arts:[{id:"neon_city",title:"真夜中のネオン都市",img:"",credit:"★HOSHI 内蔵画家"}],
  genres:[
    {type:"t1_excavate",name:"発掘",desc:"瓦礫を3つ揃えて崩し絵を掘り出す",rule:"隣とスワイプで3つ揃えると消える。連鎖で一気に発掘。",stages:[{grid:[6,6],seed:101,colors:4,art:"neon_city"}]},
    {type:"t3_swap",name:"修復",desc:"ピース交換で絵を組み直す",rule:"2枚をタップまたはドラッグで交換。",stages:[{grid:[4,4],seed:103,art:"neon_city"}]}]};
async function boot(){
  Store.load();
  $("sfxBtn").textContent=Store.data.settings.sfx?"🔊":"🔇";
  R.init($("board"));Input.init($("board"));
  $("sfxBtn").addEventListener("click",()=>{Store.data.settings.sfx=!Store.data.settings.sfx;Store.save();
    $("sfxBtn").textContent=Store.data.settings.sfx?"🔊":"🔇";});
  $("backBtn").addEventListener("click",()=>{if(Shell.scr==="play"){Game.saveResume();Shell.genre(Shell.gi);}else Shell.home();});
  $("resetBtn").addEventListener("click",()=>{if(Game.cur){Store.data.resume=null;Store.save();Game.loadStage(Game.cur.gi,Game.cur.si,true);}});
  const hb=$("hintBtn");
  hb.addEventListener("pointerdown",()=>{R.hint=true;R.draw();});
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>hb.addEventListener(ev,()=>{R.hint=false;R.draw();}));
  window.addEventListener("resize",()=>{if(Game.mod&&Game.grid){R.layout(Game.grid);R.draw();}});
  let data=FALLBACK;
  try{const res=await fetch("genres.json",{cache:"no-cache"});if(res.ok)data=await res.json();}catch(e){}
  Game.arts=data.arts;Game.genres=data.genres;
  if(Game.arts.length&&Game.arts[0].img)Shell.setBg(Game.arts[0]);
  Shell.home();
}
/* ============ テストフック ============ */
window.__pz={
  load:(gi,si)=>Game.loadStage(gi,si,true),
  loadUi:(gi,si)=>Game.loadStage(gi,si),
  grid:()=>Game.grid,mod:()=>Game.mod,game:Game,store:Store,shell:Shell,modules:MODULES,
  tap:(i)=>Game.handle(Game.mod.onTap&&Game.mod.onTap(i)),
  swipe:(i,dir)=>Game.handle(Game.mod.onSwipe&&Game.mod.onSwipe(i,dir)),
  drop:(a,b)=>Game.handle(Game.mod.onDrop&&Game.mod.onDrop(a,b)),
  solveT3:async function(){const g=Game.grid;for(let i=0;i<g.cells.length;i++){
    while(g.cells[i].art!==i){const j=g.cells.findIndex(c=>c.art===i);await Game.handle(Game.mod.doSwap(i,j));}}},
  addModule:(id,def)=>{MODULES[id]=(def&&typeof def.make==="function")?def:
    {make:function(){return def;},name:def.name||id,icon:def.icon||"✨",desc:def.desc||""};},
  rngTest:makeRng,T1:T1Excavate,T3:T3Swap
};
boot();
