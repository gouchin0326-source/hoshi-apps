<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="../../index.html" class="hub-back" style="display:inline-flex;align-items:center;gap:6px;margin:12px;padding:9px 16px;background:#e6f1fb;color:#0c447c;text-decoration:none;border-radius:10px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;font-size:15px;font-weight:500;">← アプリ一覧へ戻る</a>
    <div class="clock-container">
        <div id="clock"></div>
        <button id="toggle-format">12-hour format</button>
    </div>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
      }
    </script>
</body>
</html>
