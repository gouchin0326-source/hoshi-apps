<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンター</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
    <a href="../../index.html" class="hub-back" style="display:inline-flex;align-items:center;gap:6px;margin:12px;padding:9px 16px;background:#e6f1fb;color:#0c447c;text-decoration:none;border-radius:10px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;font-size:15px;font-weight:500;">← アプリ一覧へ戻る</a>
    <div class="container">
        <h1>文字数カウンター</h1>
        <textarea id="text-input" placeholder="テキストを入力してください"></textarea>
        <div class="stats">
            <p>文字数: <span id="char-count">0</span></p>
            <p>単語数: <span id="word-count">0</span></p>
            <p>行数: <span id="line-count">0</span></p>
        </div>
        <input type="number" id="max-char-limit" placeholder="上限文字数">
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
