<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★HOSHI — 作品を見る</title>
<meta name="theme-color" content="#0d1220">
<style>
  :root{
    --bg:#0d1220; --panel:#161d31; --panel2:#1c2440; --line:#2a3558;
    --tx:#e8ecf6; --dim:#9aa7c7; --acc:#5ac8fa; --ok:#34d399; --hoshi:#e7b24a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);line-height:1.6;
       font-family:-apple-system,"Segoe UI","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
       -webkit-text-size-adjust:100%}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 48px}
  header{margin-bottom:16px}
  h1{font-size:26px;letter-spacing:.04em}
  h1 .s{color:var(--hoshi)}
  .lead{color:var(--dim);font-size:13px;margin-top:2px}
  .hero{display:block;position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);margin:16px 0;text-decoration:none}
  .hero img{width:100%;max-height:280px;object-fit:cover;display:block;background:#000}
  .hero .ov{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;
            background:linear-gradient(180deg,rgba(13,18,32,0),rgba(13,18,32,.92))}
  .hero .t{font-size:18px;font-weight:700;color:#fff}
  .hero .d{font-size:12.5px;color:var(--dim);margin-top:1px}
  .hero .go{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;color:#0d1220;
            background:var(--hoshi);border-radius:999px;padding:6px 14px}
  h2{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);
     margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .apps{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .app{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;
       text-decoration:none;color:inherit;display:block}
  .app:active{transform:scale(.99)}
  .app .ic{font-size:22px}
  .app .name{font-size:15px;font-weight:600;margin-top:4px}
  .app .desc{font-size:12px;color:var(--dim);margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:8px;margin-top:4px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 8px;text-align:center}
  .stat .n{font-size:20px;font-weight:700}
  .stat .l{font-size:10.5px;color:var(--dim);margin-top:2px}
  footer{margin-top:26px;color:var(--dim);font-size:11.5px;text-align:center;line-height:1.7;
         border-top:1px solid var(--line);padding-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="s">★</span>HOSHI</h1>
    <p class="lead">つくった作品を、見る。（スマホ／PC対応）</p>
  </header>

  <a class="hero" href="../tenkyu/">
    <img src="../tenkyu/assets/img/w6c8f67f0ac.jpg" alt="星天球 キービジュアル">
    <div class="ov">
      <div class="t">🌌 星天球 ─ ほしてんきゅう</div>
      <div class="d">つくった作品を星にして、3Dで飛びながら観る美術館</div>
      <span class="go">ひらく →</span>
    </div>
  </a>

  <h2>作品・アプリ</h2>
  <div class="apps">
    <a class="app" href="../tenkyu/">
      <div class="ic">🌌</div>
      <div class="name">星天球（3D作品美術館）</div>
      <div class="desc">作品の海を飛びながら観る・WebGL</div>
    </a>
    <a class="app" href="../">
      <div class="ic">★</div>
      <div class="name">★HOSHI 公開ハブ</div>
      <div class="desc">公開アプリの一覧</div>
    </a>
  </div>

  <h2>いまの制作（★HOSHI 新PC）</h2>
  <div class="stats">
    <div class="stat"><div class="n">59</div><div class="l">生成物</div></div>
    <div class="stat"><div class="n">33</div><div class="l">画像</div></div>
    <div class="stat"><div class="n">13</div><div class="l">音楽</div></div>
    <div class="stat"><div class="n">10</div><div class="l">動画</div></div>
    <div class="stat"><div class="n">3</div><div class="l">詩・他</div></div>
  </div>

  <footer>
    ★HOSHI ／ 公開に出しているのは完成作品のみ。<br>
    実物のローカル正本は非公開。
  </footer>
</div>
</body>
</html>
