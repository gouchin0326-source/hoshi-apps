<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業時間管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            font-size: 16px;
        }
        #totalTime {
            font-size: 24px;
            margin-top: 20px;
        }
        #historyList {
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
        .historyItem {
            padding: 10px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            background-color: #f9f9f9;
            border-bottom: 1px solid #ccc;
        }
        .historyItem:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <button id="startBtn">開始</button>
    <button id="pauseBtn" disabled>中断</button>
    <button id="resumeBtn" disabled>再開</button>
    <button id="endBtn" disabled>終了</button>
    <div id="totalTime">00時間00分00秒</div>
    <div id="historyList"></div>
    <button id="exportBtn">CSVエクスポート</button>

    <script>
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const endBtn = document.getElementById('endBtn');
        const totalTimeDisplay = document.getElementById('totalTime');
        const historyList = document.getElementById('historyList');
        const exportBtn = document.getElementById('exportBtn');

        let startTime, pauseTime, endTime;
        let sessions = JSON.parse(localStorage.getItem('sessions')) || [];

        function updateTotalTime() {
            let totalSeconds = 0;
            for (const session of sessions) {
                if (session.endTime) {
                    const start = new Date(session.startTime);
                    const end = new Date(session.endTime);
                    let diff = (end - start) / 1000;
                    if (session.pauseTime && session.resumeTime) {
                        const pause = new Date(session.pauseTime);
                        const resume = new Date(session.resumeTime);
                        diff -= (resume - pause) / 1000;
                    }
                    totalSeconds += Math.floor(diff);
                } else {
                    const start = new Date(session.startTime);
                    const now = new Date();
                    let diff = (now - start) / 1000;
                    if (session.pauseTime) {
                        const pause = new Date(session.pauseTime);
                        diff -= (pause - start) / 1000;
                    }
                    totalSeconds += Math.floor(diff);
                }
            }
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            totalTimeDisplay.textContent = `${hours.toString().padStart(2, '0')}時間${minutes.toString().padStart(2, '0')}分${seconds.toString().padStart(2, '0')}秒`;
        }

        function updateHistoryList() {
            historyList.innerHTML = '';
            for (const session of sessions) {
                const item = document.createElement('div');
                item.className = 'historyItem';
                let start = new Date(session.startTime).toLocaleString();
                let pause = session.pauseTime ? new Date(session.pauseTime).toLocaleString() : '-';
                let resume = session.resumeTime ? new Date(session.resumeTime).toLocaleString() : '-';
                let end = session.endTime ? new Date(session.endTime).toLocaleString() : '作業中';
                let workTime;
                if (session.endTime) {
                    const start = new Date(session.startTime);
                    const end = new Date(session.endTime);
                    let diff = (end - start) / 1000;
                    if (session.pauseTime && session.resumeTime) {
                        const pause = new Date(session.pauseTime);
                        const resume = new Date(session.resumeTime);
                        diff -= (resume - pause) / 1000;
                    }
                    workTime = `${Math.floor(diff / 3600)}時間${Math.floor((diff % 3600) / 60)}分${Math.floor(diff % 60)}秒`;
                } else {
                    const start = new Date(session.startTime);
                    const now = new Date();
                    let diff = (now - start) / 1000;
                    if (session.pauseTime) {
                        const pause = new Date(session.pauseTime);
                        diff -= (pause - start) / 1000;
                    }
                    workTime = `${Math.floor(diff / 3600)}時間${Math.floor((diff % 3600) / 60)}分${Math.floor(diff % 60)}秒`;
                }
                item.textContent = `${start} - ${end} (${workTime})`;
                historyList.appendChild(item);
            }
        }

        function saveData() {
            localStorage.setItem('sessions', JSON.stringify(sessions));
        }

        startBtn.addEventListener('click', () => {
            startTime = new Date().toISOString();
            sessions.push({ startTime });
            updateHistoryList();
            updateTotalTime();
            pauseBtn.disabled = false;
            endBtn.disabled = false;
            saveData();
        });

        pauseBtn.addEventListener('click', () => {
            const currentSession = sessions[sessions.length - 1];
            if (!currentSession.pauseTime) {
                currentSession.pauseTime = new Date().toISOString();
                updateHistoryList();
                updateTotalTime();
                resumeBtn.disabled = false;
                saveData();
            }
        });

        resumeBtn.addEventListener('click', () => {
            const currentSession = sessions[sessions.length - 1];
            if (currentSession.pauseTime && !currentSession.resumeTime) {
                currentSession.resumeTime = new Date().toISOString();
                updateHistoryList();
                updateTotalTime();
                saveData();
            }
        });

        endBtn.addEventListener('click', () => {
            const currentSession = sessions[sessions.length - 1];
            if (!currentSession.endTime) {
                currentSession.endTime = new Date().toISOString();
                updateHistoryList();
                updateTotalTime();
                pauseBtn.disabled = true;
                resumeBtn.disabled = true;
                endBtn.disabled = true;
                saveData();
            }
        });

        exportBtn.addEventListener('click', () => {
            let csvContent = '日付,開始時刻,中断時刻,再開時刻,終了時刻,作業時間\n';
            for (const session of sessions) {
                const start = new Date(session.startTime).toLocaleString();
                const pause = session.pauseTime ? new Date(session.pauseTime).toLocaleString() : '-';
                const resume = session.resumeTime ? new Date(session.resumeTime).toLocaleString() : '-';
                const end = session.endTime ? new Date(session.endTime).toLocaleString() : '作業中';
                let workTime;
                if (session.endTime) {
                    const start = new Date(session.startTime);
                    const end = new Date(session.endTime);
                    let diff = (end - start) / 1000;
                    if (session.pauseTime && session.resumeTime) {
                        const pause = new Date(session.pauseTime);
                        const resume = new Date(session.resumeTime);
                        diff -= (resume - pause) / 1000;
                    }
                    workTime = `${Math.floor(diff / 3600)}時間${Math.floor((diff % 3600) / 60)}分${Math.floor(diff % 60)}秒`;
                } else {
                    const start = new Date(session.startTime);
                    const now = new Date();
                    let diff = (now - start) / 1000;
                    if (session.pauseTime) {
                        const pause = new Date(session.pauseTime);
                        diff -= (pause - start) / 1000;
                    }
                    workTime = `${Math.floor(diff / 3600)}時間${Math.floor((diff % 3600) / 60)}分${Math.floor(diff % 60)}秒`;
                }
                csvContent += `${start},${pause},${resume},${end},${workTime}\n`;
            }
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '作業時間履歴.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        window.addEventListener('load', () => {
            updateHistoryList();
            updateTotalTime();
        });
    </script>
</body>
</html>
